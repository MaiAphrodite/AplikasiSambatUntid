name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/aplikasisambatuntid

jobs:
  check:
    name: Doctor / Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: bun install

      - name: Install User Service Dependencies
        working-directory: ./services/user-service
        run: bun install

      - name: Install Rant Service Dependencies
        working-directory: ./services/rant-service
        run: bun install

      - name: Install Interaction Service Dependencies
        working-directory: ./services/interaction-service
        run: bun install

      - name: Check Frontend (Svelte & Types)
        working-directory: ./frontend
        run: bun run check

      - name: Check User Service (Types)
        working-directory: ./services/user-service
        run: bun run check

      - name: Check Rant Service (Types)
        working-directory: ./services/rant-service
        run: bun run check

      - name: Check Interaction Service (Types)
        working-directory: ./services/interaction-service
        run: bun run check

  publish:
    name: Build & Push to GHCR
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        include:
          - context: ./frontend
            image: frontend
          - context: ./services/user-service
            image: user-service
          - context: ./services/rant-service
            image: rant-service
          - context: ./services/interaction-service
            image: interaction-service

    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
